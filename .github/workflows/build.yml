name: Build

on:
  push:
    branches:
      - master
      - 'cursor/**'
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Deepen cssdm submodule history
        run: |
          git -C cssdm fetch --unshallow 2>/dev/null || git -C cssdm fetch --depth=500 || true
          echo "cssdm rev-list=$(git -C cssdm rev-list --count HEAD)"
          echo "cssdm HEAD=$(git -C cssdm rev-parse --short HEAD)"
          cat cssdm/product.version

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            curl \
            g++-multilib \
            gcc-multilib \
            git \
            lib32stdc++6 \
            lib32z1-dev \
            libc6-dev-i386 \
            libstdc++-12-dev:i386 \
            linux-libc-dev \
            python3 \
            python3-pip \
            python3-venv \
            zlib1g-dev:i386

      - name: Set up Python tools
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip setuptools wheel
          .venv/bin/pip install requests uritemplate discord-webhook
          git clone --depth 1 https://github.com/alliedmodders/ambuild /tmp/ambuild
          .venv/bin/pip install /tmp/ambuild

      - name: Checkout build dependencies
        run: |
          git clone --depth 1 -b episode1 https://github.com/alliedmodders/hl2sdk "$HOME/hl2sdk-episode1"
          git clone --depth 1 -b 1.10-dev https://github.com/alliedmodders/metamod-source "$HOME/mmsource"
          git clone --depth 1 -b 1.10-dev --recursive https://github.com/alliedmodders/sourcemod "$HOME/sourcemod"
          mkdir -p "$HOME/sourcemod-bin"
          curl -fL --retry 5 -o /tmp/sm-bin.tgz \
            https://github.com/rom4s/sourcemod-css34/releases/download/v1.11.0.6572/sourcemod-1.11.0-git6572-css34-linux.tar.gz
          tar -xzf /tmp/sm-bin.tgz -C "$HOME/sourcemod-bin"

      - name: Build CSS:DM for CS:S v34
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
          CC: gcc
          CXX: g++
        run: |
          chmod +x builder/run/linux.sh testing/scripts/*.sh
          export PATH="${VIRTUAL_ENV}/bin:${PATH}"
          export DEPS_DIR="${HOME}"
          builder/run/linux.sh
          mkdir -p packages
          cp -f OUT/package/cssdm-*-css34-linux.tar.gz packages/
          ls -lh packages/

      - name: Check package
        run: |
          CSSDM_PACKAGE="$(ls packages/cssdm-*-css34-linux.tar.gz | head -n1)"
          export CSSDM_PACKAGE
          testing/scripts/check-cssdm-package.sh

      - name: Upload CSS:DM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cssdm-css34-linux
          path: packages/cssdm-*-css34-linux.tar.gz
          if-no-files-found: error
